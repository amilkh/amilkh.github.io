<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>竹本研究室 — Teacher</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #111; color: #eee; flex-direction: column; gap: 16px; }
    .msg { font-size: 1.2rem; }
    .sub { font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <div class="msg" id="msg">Connecting to classroom…</div>
  <div class="sub" id="sub"></div>
  <script>
    const TOKEN = "sWBkvO4MIREjVL58";
    // Try takelab direct LAN first (school network), fall back to tunnel URL
    const LAN = "http://10.10.5.59:8080/?t=" + TOKEN;
    const img = new Image();
    img.onload = () => window.location.replace(LAN);
    img.onerror = () => {
      // LAN not reachable — use tunnel URL from GitHub Pages
      fetch("/seminar/tunnel-url.json?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
          const url = data.url.replace(/\/$/, "");
          document.getElementById("sub").textContent = url;
          window.location.replace(url + "/?t=" + TOKEN);
        })
        .catch(() => {
          document.getElementById("msg").textContent = "Could not connect. Is the server running?";
        });
    };
    // Probe LAN via a tiny image request (will fail with CORS/net error if unreachable)
    img.src = "http://10.10.5.59:8080/api/qr?" + Date.now();
  </script>
</body>
</html>
