<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>竹本研究室 — Teacher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #111; }
    iframe { width: 100%; height: 100%; border: none; }
    #overlay { position: fixed; inset: 0; background: #111; color: #aaa;
               font-family: sans-serif; font-size: 1rem;
               display: flex; flex-direction: column; align-items: center;
               justify-content: center; gap: 12px; z-index: 10; }
  </style>
</head>
<body>
  <div id="overlay"><div id="msg">Connecting to classroom…</div></div>
  <iframe id="frame" allow="microphone; camera; display-capture"></iframe>
  <script>
    const TOKEN = "sWBkvO4MIREjVL58";
    fetch("/seminar/tunnel-url.json?t=" + Date.now())
      .then(r => r.json())
      .then(data => {
        const url = data.url.replace(/\/$/, "");
        const frame = document.getElementById("frame");
        frame.onload = () => document.getElementById("overlay").style.display = "none";
        frame.src = url + "/?t=" + TOKEN;
      })
      .catch(() => {
        document.getElementById("msg").textContent = "Could not load tunnel URL — is the server running?";
      });
  </script>
</body>
</html>
