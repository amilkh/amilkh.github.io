<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>竹本研究室 — Teacher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #111; }
    iframe { width: 100%; height: 100%; border: none; }
    #overlay { position: fixed; inset: 0; background: #111; color: #aaa;
                font-family: sans-serif; font-size: 1rem;
                display: flex; flex-direction: column; align-items: center;
                justify-content: center; gap: 12px; z-index: 10; }
    #overlay button { padding: 8px 20px; background: #333; color: #eee;
                      border: 1px solid #555; border-radius: 6px;
                      cursor: pointer; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="msg">Connecting to classroom…</div>
    <button id="retry" style="display:none" onclick="load()">Retry</button>
  </div>
  <iframe id="frame" allow="microphone; camera; display-capture"></iframe>
  <script>
    const TOKEN = "sWBkvO4MIREjVL58";

    function load() {
      document.getElementById("msg").textContent = "Connecting to classroom…";
      document.getElementById("retry").style.display = "none";

      fetch("/seminar/tunnel-url.json?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
          const url = data.url.replace(/\/$/, "");
          document.getElementById("msg").textContent = "Loading " + url + " …";
          return fetch(url + "/api/health").then(r => r.json()).then(h => {
            if (!h.ok) throw new Error("not ok");
            return url;
          });
        })
        .then(url => {
          document.getElementById("frame").src = url + "/?t=" + TOKEN;
          document.getElementById("overlay").style.display = "none";
        })
        .catch(() => {
          document.getElementById("msg").textContent = "Server unreachable — retrying in 10s…";
          document.getElementById("retry").style.display = "block";
          setTimeout(load, 10000);
        });
    }

    load();
  </script>
</body>
</html>
