<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab Seminar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 1rem;
  }
  #loader p { color: #94a3b8; font-size: 0.95rem; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #334155;
    border-top-color: #60a5fa; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe {
    display: none; position: fixed;
    inset: 0; width: 100%; height: 100%; border: none;
  }
</style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <p>Connecting to seminar…</p>
</div>
<iframe id="viewer" allow="microphone"></iframe>
<script>
const CACHE_BUST = `?t=${Math.floor(Date.now() / 5000)}`;

async function load() {
  let viewerUrl;
  try {
    const r = await fetch(`./tunnel-url.json${CACHE_BUST}`);
    const data = r.ok ? await r.json() : null;
    viewerUrl = data?.url
      ? `${data.url.replace(/\/?$/, "")}/?view`
      : "https://10.10.5.59:8443/?view";  // HTTPS LAN fallback
  } catch (_) {
    viewerUrl = "https://10.10.5.59:8443/?view";
  }

  const frame = document.getElementById("viewer");
  frame.src = viewerUrl;
  frame.onload = () => {
    document.getElementById("loader").style.display = "none";
    frame.style.display = "block";
  };
  // If iframe fails to load (e.g. cert error on LAN fallback), show a helpful message
  frame.onerror = () => {
    document.getElementById("loader").innerHTML =
      `<p style="color:#f87171">Could not connect. Ask your instructor for the URL.</p>`;
  };
}

load();
</script>
</body>
</html>
