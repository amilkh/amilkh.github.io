<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab Seminar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 1rem; padding: 2rem; text-align: center; }
  #loader p { color: #94a3b8; font-size: 0.95rem; }
  .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><p>Connecting to seminar…</p></div>
<iframe id="viewer" allow="microphone"></iframe>
<script>
function loadViewer(serverUrl) {
  const frame = document.getElementById("viewer");
  frame.src = serverUrl + "/?view";
  frame.onload = () => {
    document.getElementById("loader").style.display = "none";
    frame.style.display = "block";
  };
}

const CLOUD_URL = "https://takemoto-seminar.japaneast.cloudapp.azure.com";

async function load() {
  // Try cloud VM first (stable, always-on)
  try {
    const probe = await fetch(CLOUD_URL + "/api/health", { signal: AbortSignal.timeout(4000) });
    if (probe.ok) { loadViewer(CLOUD_URL); return; }
  } catch (_) {}
  // Fall back to tunnel-url.json
  try {
    const r = await fetch("./tunnel-url.json?t=" + Math.floor(Date.now() / 5000));
    const data = r.ok ? await r.json() : null;
    if (data?.url) { loadViewer(data.url.replace(/\/?$/, "")); return; }
  } catch (_) {}
  // Last resort: laptop on LAN
  loadViewer("http://10.60.67.230:8080");
}

load();
</script>
</body>
</html>
