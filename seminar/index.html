<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab Seminar</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #0f172a; color: #e2e8f0;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p  { color: #94a3b8; font-size: 0.95rem; margin: 0.25rem 0; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #334155;
    border-top-color: #60a5fa; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 1.5rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f87171; margin-top: 1rem; }
  a { color: #60a5fa; }
</style>
</head>
<body>
<h1>Takemoto Lab Seminar Assistant</h1>
<p>Connecting to today's session…</p>
<div class="spinner" id="spinner"></div>
<p id="status"></p>
<script>
const JSON_URL = "https://amilkh.github.io/seminar/tunnel-url.json";
const CACHE_BUST = `?t=${Math.floor(Date.now()/30000)}`;   // busts every 30 s

async function redirect() {
  try {
    const r = await fetch(JSON_URL + CACHE_BUST);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (!data.url) throw new Error("No active session URL");
    const dest = data.url.replace(/\/?$/, "/?view");
    document.getElementById("status").textContent = "Redirecting…";
    location.replace(dest);
  } catch (err) {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("status").innerHTML =
      `<span class="error">Could not connect: ${err.message}</span><br>
       Try refreshing in a moment, or ask your instructor for the URL.`;
  }
}

redirect();
</script>
</body>
</html>
