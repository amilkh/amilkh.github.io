<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab Seminar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, sans-serif;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  #msg { text-align: center; }
  p { color: #94a3b8; margin-top: 0.5rem; font-size: 0.9rem; }
  .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #60a5fa;
             border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="msg"><div class="spinner"></div><p>Connecting to seminar…</p></div>
<script>
async function load() {
  try {
    const r = await fetch("./tunnel-url.json?t=" + Math.floor(Date.now() / 5000));
    const data = r.ok ? await r.json() : null;
    if (data?.url) {
      window.location.replace(data.url.replace(/\/?$/, "") + "/?view");
      return;
    }
  } catch (_) {}
  window.location.replace("http://10.60.67.230:8080/?view");
}
load();
</script>
</body>
</html>
