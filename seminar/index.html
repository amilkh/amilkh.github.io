<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab Seminar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 1rem; padding: 2rem; text-align: center;
  }
  #loader p { color: #94a3b8; font-size: 0.95rem; }
  .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
  .cert-link { display: inline-block; margin-top: 0.5rem; padding: 0.5rem 1.2rem; border-radius: 6px; background: #2563eb; color: #fff; text-decoration: none; font-size: 0.9rem; }
  .cert-link:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <p>Connecting to seminar…</p>
</div>
<iframe id="viewer" allow="microphone"></iframe>
<script>
const CACHE_BUST = `?t=${Math.floor(Date.now() / 5000)}`;

async function load() {
  let serverUrl;
  try {
    const r = await fetch(`./tunnel-url.json${CACHE_BUST}`);
    const data = r.ok ? await r.json() : null;
    serverUrl = data?.url ? data.url.replace(/\/?$/, "") : "https://10.10.5.59:8443";
  } catch (_) {
    serverUrl = "https://10.10.5.59:8443";
  }

  const frame = document.getElementById("viewer");
  frame.src = `${serverUrl}/?view`;

  // 6-second timeout: if iframe hasn't loaded, the cert needs accepting once
  const certTimeout = setTimeout(() => {
    document.getElementById("loader").innerHTML = `
      <p style="color:#f87171;font-size:1rem">Could not connect to the seminar server.</p>
      <p style="margin-top:0.5rem">Your browser needs to trust the server certificate once.<br>
         Click the button below, accept the security warning, then come back here.</p>
      <a class="cert-link" href="${serverUrl}" target="_blank">Open server &amp; accept certificate →</a>
      <p style="margin-top:1rem;font-size:0.8rem;color:#64748b">After accepting, reload this page.</p>`;
  }, 6000);

  frame.onload = () => {
    clearTimeout(certTimeout);
    document.getElementById("loader").style.display = "none";
    frame.style.display = "block";
  };
}

load();
</script>
</body>
</html>
