<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab — Teacher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 1rem;
  }
  #loader h1 { font-size: 1.2rem; }
  #loader p { color: #94a3b8; font-size: 0.9rem; }
  .spinner {
    width: 36px; height: 36px; border: 4px solid #334155;
    border-top-color: #60a5fa; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<div id="loader">
  <h1>Takemoto Lab — Teacher</h1>
  <div class="spinner"></div>
  <p id="status">Connecting…</p>
</div>
<iframe id="frame" allow="microphone"></iframe>
<script>
const TOKEN = "sWBkvO4MIREjVL58";

async function load() {
  let base;
  try {
    const r = await fetch(`../tunnel-url.json?t=${Math.floor(Date.now()/5000)}`);
    const data = r.ok ? await r.json() : null;
    base = data?.url ? data.url.replace(/\/?$/, "") : "https://10.10.5.59:8443";
  } catch (_) {
    base = "https://10.10.5.59:8443";
  }

  const frame = document.getElementById("frame");
  frame.src = `${base}/?t=${TOKEN}`;
  frame.onload = () => {
    document.getElementById("loader").style.display = "none";
    frame.style.display = "block";
  };
}

load();
</script>
</body>
</html>
