<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takemoto Lab — Teacher</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #0f172a; color: #e2e8f0;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p  { color: #94a3b8; font-size: 0.95rem; margin: 0.25rem 0; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #334155;
    border-top-color: #60a5fa; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 1.5rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f87171; margin-top: 1rem; }
</style>
</head>
<body>
<h1>Takemoto Lab — Teacher Mode</h1>
<p>Opening mic controls…</p>
<div class="spinner" id="spinner"></div>
<p id="status"></p>
<script>
async function redirect() {
  try {
    const r = await fetch("../tunnel-url.json?t=" + Math.floor(Date.now()/5000));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (!data.url) throw new Error("No active session URL");
    document.getElementById("status").textContent = "Redirecting…";
    location.replace(data.url.replace(/\/?$/, "/"));
  } catch (err) {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("status").innerHTML =
      `<span class="error">Could not connect: ${err.message}</span><br>
       Try refreshing, or open http://127.0.0.1:8088 directly.`;
  }
}
redirect();
</script>
</body>
</html>
